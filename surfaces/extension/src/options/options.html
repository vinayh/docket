<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Docket — options</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <h1>Docket extension</h1>
      <p>
        Connect this browser to your Docket backend. The extension's only
        job today is to capture replies on Google Docs suggestion threads
        — the public Drive/Docs APIs don't expose them, and they're lost
        when the doc moves on without an extension-equipped viewer.
      </p>

      <form id="form">
        <label>
          Backend URL
          <input
            type="url"
            id="backendUrl"
            name="backendUrl"
            required
            placeholder="https://docket.example.com"
          />
          <small>
            Local dev: <code>http://localhost:8787</code>. Must match the
            host running <code>bun docket serve</code>.
          </small>
        </label>

        <label>
          API token
          <input
            type="password"
            id="apiToken"
            name="apiToken"
            required
            autocomplete="off"
            placeholder="dkt_..."
          />
          <small>
            Issue one with <code>bun docket token issue --user &lt;email&gt;</code>.
            The token authenticates POSTs to
            <code>/api/extension/captures</code>.
          </small>
        </label>

        <button type="submit">Save</button>
        <button type="button" id="test">Test connection</button>
        <p id="status" role="status"></p>
      </form>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
