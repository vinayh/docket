coverage:
  status:
    project:
      default:
        # Don't fail the PR check on small drift — codecov is informational,
        # not a gate. Adjust once the integration suite stabilizes.
        target: auto
        threshold: 1%

# CLI subcommands are thin `parseArgs` shells over `src/domain/` (see
# AGENTS.md); the dispatcher (`src/cli/index.ts`) is the only branching
# part and is tested directly. The migrator runs at startup, not in the
# request path. Excluding both from coverage so the project total
# reflects production code only.
ignore:
  - "src/cli/**/*"
  - "src/db/migrate.ts"

# Two parallel uploads merge into the project total:
#   - `unit`: ci.yml on every push/PR (mocked transports + temp-DB)
#   - `integration`: integration.yml on workflow_dispatch + nightly cron
#     (live Google APIs)
# Each flag is filterable from the codecov dashboard.
flags:
  unit:
    paths:
      - src/
    carryforward: false
  integration:
    paths:
      - src/
    # No carryforward: a stale integration session from a previous commit
    # ships its own line numbers and merges badly with the current unit
    # upload (Codecov ends up reporting on lines that no longer exist —
    # e.g. ingest.ts showed 6% under the carryforward session because the
    # nightly's 149-line snapshot didn't line up with the current 144-line
    # file). Integration only contributes when integration.yml actually runs.
    carryforward: false
