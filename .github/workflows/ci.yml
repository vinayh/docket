name: app

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test:coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          # `flags: unit` tags this upload so the nightly `integration.yml`
          # workflow can upload its own report under `flags: integration`.
          # Codecov merges flagged reports into the project total and lets
          # you filter the dashboard by flag.
          flags: unit
          fail_ci_if_error: false

  deploy:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # Pre-start the machine so the rolling deploy doesn't try to verify
      # HTTP health checks against a stopped VM (auto_stop_machines = "stop"
      # + single machine deadlocks the rolling-deploy health-check wait).
      # Idempotent: no-op if already running.
      - run: |
          flyctl machines list -a margin-server --json \
            | jq -r '.[].id' \
            | xargs -r flyctl machine start -a margin-server
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
