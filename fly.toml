# Fly.io app config. App name and region are placeholders; flyctl will
# set `app` on first launch / `fly apps create`.
#
# Why these knobs:
# - SQLite (`bun:sqlite`) lives on a Fly Volume mounted at /data so it
#   survives machine restarts. MARGIN_DB_PATH points at it.
# - min_machines_running = 1 keeps the Drive `files.watch` webhook
#   reachable without cold-start drops (SPEC §9.3). Auto-stop still
#   trims any auto-scaled extras when idle.
# - Health check hits /healthz (served by `bun margin serve`).
# - Secrets (GOOGLE_*, MARGIN_MASTER_KEY, BETTER_AUTH_SECRET) are set via
#   `fly secrets set`.

app = "margin-server"
primary_region = "lhr"

[build]

[env]
  PORT = "8787"
  MARGIN_DB_PATH = "/data/margin.db"
  NODE_ENV = "production"
  # Public origin used to compute the Drive files.watch callback URL and to
  # gate the in-process renew + polling loops. Update if the app is renamed.
  MARGIN_PUBLIC_BASE_URL = "https://api.margin.pub"
  # Fly's edge sets `Fly-Client-IP` / `X-Forwarded-For` for every request;
  # opt in so the rate limiter buckets per real client instead of per edge IP.
  MARGIN_TRUST_PROXY = "1"

[[mounts]]
  source = "margin_data"
  destination = "/data"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
